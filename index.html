<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placar - Transmissão Ao Vivo</title>

    <script src="https://unpkg.com/vanilla-picker@2.12.3/dist/vanilla-picker.min.js"></script>

    <!-- FIREBASE SDKS -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDDZksOq7wlMeB75bwyOpH6unXrufq51L8",
        authDomain: "placar-c5ce7.firebaseapp.com",
        projectId: "placar-c5ce7",
        storageBucket: "placar-c5ce7.firebasestorage.app",
        messagingSenderId: "210751704219",
        appId: "1:210751704219:web:1186f5694c078e9e630a3e",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const appId = "placar-campeonato-principal-123";

      const matchDocRef = doc(
        db,
        "artifacts",
        appId,
        "public",
        "data",
        "matchData",
        "currentMatch",
      );

      window.dbControls = {
        updateState: async (partialState) => {
          if (!window.currentUser) return;
          try {
            await setDoc(matchDocRef, partialState, { merge: true });
          } catch (error) {
            console.error("Erro ao guardar:", error);
          }
        },
      };

      const initAuth = async () => {
        try {
          await signInAnonymously(auth);
        } catch (error) {
          console.error("Erro na autenticação:", error);
          alert(
            "Erro a ligar à base de dados. Verificou se ativou a autenticação Anónima no Firebase?",
          );
        }
      };

      initAuth();

      onAuthStateChanged(auth, (user) => {
        window.currentUser = user;
        if (user) {
          onSnapshot(
            matchDocRef,
            (docSnap) => {
              if (docSnap.exists()) {
                window.syncToUI(docSnap.data());
              } else {
                window.dbControls.updateState(window.getInitialState());
              }
            },
            (error) => {
              console.error("Erro de sincronização:", error);
            },
          );
        }
      });
    </script>

    <style>
      :root {
        --bg-dark: #0b0c10;
        --score-cyan: #45f3c5;
        --text-light: #ffffff;
        --text-dark: #000000;
        --font-main: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

        --border-salmon: #ff9a96;
        --border-red: #e3001b;
        --border-green: #a8e63a;
        --border-purple: #c7a8ff;

      }

      body {

        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 40px;

      }

      }

      }

        color: #ffffff;

        display: flex;

      .left-inner,

      }

      .score-panel,

        align-items: center;
        justify-content: center;
        padding: 0 10px;
        height: 47px;
        margin-top: 3px;
        font-size: 35px;
        color: var(--text-dark);
        z-index: 4;
      }
      .score-panel {

      .center-badge {

        align-items: center;

        height: 100%;

        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .team-dot {

        height: 10px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.3);
        margin: 0 8px;
      }

        background-color: var(--dot-color-1);
      }
      #dot-t2 {
        background-color: var(--dot-color-2);
      }
      .team-name {

        letter-spacing: 0.5px;
        color: var(--text-light);
        margin-top: -2px;
      }

      .red-cards-container {
        position: absolute;
        top: -16px;
        display: flex;
        gap: 4px;
      }
      .red-card {
        width: 8px;
        height: 18px;
        background-color: #ff0000;
        border-radius: 2px;
      }

      .controls-container {
        background-color: #34495e;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        width: 90%;
        max-width: 800px;
      }
      .controls-container h2 {
        margin-top: 0;
        text-align: center;
        border-bottom: 1px solid #45b39d;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      .control-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      @media (max-width: 600px) {
        .control-grid {
          grid-template-columns: 1fr;
        }
      }
      .control-group {
        background: rgba(0, 0, 0, 0.1);
        padding: 15px;
        border-radius: 8px;
      }
      .control-group h3 {
        margin-top: 0;
        font-size: 16px;
        color: #45f3c5;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
      }
      input,
      button {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-family: inherit;
        box-sizing: border-box;
      }

      .obs-color-picker-btn {
        width: 100%;
        height: 38px;
        border-radius: 6px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
        font-weight: bold;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        color: #fff;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        transition: transform 0.1s;
      }
      .obs-color-picker-btn:active {
        transform: scale(0.98);
      }
      .btn-group {
        display: flex;
        gap: 10px;
      }
      button {
        background-color: #45f3c5;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        border: none;
        transition: background 0.2s;
        font-size: 14px;
      }
      button:hover {
        background-color: #35c49f;
      }
      .btn-team-select {
        background-color: #c7a8ff;
        margin-bottom: 15px;
      }
      .btn-team-select:hover {
        background-color: #b08cf0;
      }
      .timer-controls {
        grid-column: 1 / -1;
        text-align: center;
        background: rgba(0, 0, 0, 0.1);
        padding: 15px;
        border-radius: 8px;
      }
      .timer-controls button {
        width: auto;
        padding: 10px 20px;
      }

      /* MODAL */
      .modal-overlay {
        display: none;
        position: fixed;
        z-index: 100;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        align-items: center;
        justify-content: center;
      }
      .modal-box {
        background-color: #2c3e50;
        width: 90%;
        max-width: 800px;
        max-height: 80vh;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        border: 2px solid #45f3c5;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #45b39d;
        padding-bottom: 10px;
        margin-bottom: 15px;
      }
      .modal-header h2 {
        margin: 0;
        color: #ffffff;
        font-size: 20px;
      }
      .close-btn {

        width: 40px;

        color: white;

        font-weight: bold;

        border-radius: 4px;

        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));

        overflow-y: auto;

      }
      .team-card {
        background-color: #34495e;
        border: 2px solid transparent;
        border-radius: 8px;
        padding: 12px 5px;
        cursor: pointer;
        display: flex;
        flex-direction: column;

      .team-card:hover {

      }

        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .team-card span {
        font-weight: bold;
        font-size: 14px;
        color: white;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="role-selector">

        Sistema de Placar na Nuvem
      </h1>
      <p
        style="
          color: #aaa;
          margin-bottom: 30px;
          text-align: center;
          max-width: 400px;

        Este sistema está sincronizado em tempo real. Escolha o seu ecrã:
      </p>
      <button class="btn-role obs" onclick="setRole('obs')">

      </button>
      <button class="btn-role" onclick="setRole('admin')">
        📱 Abrir Controlo (Telemóvel)
      </button>
    </div>

    <!-- O PLACAR VISUAL -->
    <div class="scoreboard">
      <div class="timer-column">
        <div class="timer-inner">
          <span

            style="
              background: #111;
              color: #fff;
              padding: 4px 8px;
              border-radius: 4px;
              margin-right: 8px;
              font-size: 14px;
              font-weight: 900;
              display: none;
            "
            >1T</span

          <span id="timer-display">45:00</span>
        </div>
        <div id="stoppage-box" class="stoppage-box" style="display: none">

      <div class="left-wrapper">

      <div class="score-0-wrapper">

      <div class="score-1-wrapper">
        <div class="score-inner">
          <div class="score-panel-2">
            <span id="score-t2-display">0</span>
          </div>
        </div>

      <div class="right-wrapper">
        <div class="right-inner" style="position: relative">

            alt="Bandeira"
          />

      </div>

    <!-- PÊNALTIS -->

        font-weight: bold;

        padding: 10px 20px;
        border-radius: 10px;
      "

    <div class="controls-container">

      <div class="control-grid">

          </div>

          </button>

          <div style="margin-bottom: 15px">
            <label>Cor da Bolinha:</label>
            <div id="picker-btn-1" class="obs-color-picker-btn">
              Escolher Cor
            </div>
          </div>

          <label>Golos:</label>
          <div class="btn-group">
            <button onclick="cloud.changeScore(1, -1)">-1 Golo</button>

          </div>
        </div>

        <div class="control-group">
          <h3 id="ctrl-name-2">Equipa Direita (Fora)</h3>

          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              margin-bottom: 10px;
            "
          >
            <label style="margin: 0">Cartão Vermelho:</label>
            <div class="btn-group" style="width: auto; gap: 5px">
              <button
                onclick="cloud.changeRed(2, -1)"
                style="margin: 0; padding: 5px 15px"
              >
                -
              </button>
              <button
                onclick="cloud.changeRed(2, 1)"
                style="margin: 0; padding: 5px 15px"
              >
                +
              </button>
            </div>
          </div>

          <button onclick="cloud.changePen(2, 1)">+ Pênalti</button>

            type="button"
            class="btn-team-select"
            onclick="ui.openModal(2)"

            Trocar Seleção
          </button>

          <div style="margin-bottom: 15px">
            <label>Cor da Bolinha:</label>
            <div id="picker-btn-2" class="obs-color-picker-btn">
              Escolher Cor
            </div>
          </div>

          <label>Golos:</label>
          <div class="btn-group">
            <button onclick="cloud.changeScore(2, -1)">-1 Golo</button>
            <button onclick="cloud.changeScore(2, 1)">+1 Golo</button>
          </div>
        </div>

        <div class="timer-controls">
          <h3>Cronómetro & Tempo Extra</h3>
          <div
            class="btn-group"
            style="justify-content: center; align-items: center"
          >
            <label style="margin: 0; width: auto">Min:</label>
            <input
              type="number"
              id="set-minutes"
              value="0"
              style="width: 70px; margin: 0"
            />
            <label style="margin: 0; width: auto; margin-left: 10px"
              >Seg:</label
            >
            <input
              type="number"
              id="set-seconds"
              value="0"
              style="width: 70px; margin: 0"
            />
            <button
              onclick="cloud.setTimer()"
              style="margin-bottom: 0; margin-left: 10px"
            >
              Definir
            </button>
          </div>
          <br />

          <div
            style="
              text-align: center;
              margin-bottom: 15px;
              padding-top: 10px;
              border-top: 1px solid rgba(255, 255, 255, 0.1);
            "
          >
            <label style="display: inline-block">Extra (Min):</label>
            <input
              type="number"
              id="stoppage-time"
              value="0"
              style="width: 80px; display: inline-block; margin: 0 10px"
            />
            <button
              onclick="cloud.setStoppage()"
              style="width: auto; display: inline-block"
            >
              Aplicar
            </button>
          </div>

          <div
            class="btn-group"
            style="justify-content: center; margin-bottom: 15px"
          >
            <button onclick="cloud.setPhase('1T')">1º Tempo</button>
            <button onclick="cloud.setPhase('2T')">2º Tempo</button>
            <button onclick="cloud.setPhase('PR')">Prorrogação</button>
            <button onclick="cloud.setPhase('PEN')">Pênaltis</button>
          </div>

          <div class="btn-group" style="justify-content: center">
            <button id="btn-play-pause" onclick="cloud.toggleTimer()">
              ▶ Iniciar / ⏸ Pausar
            </button>
            <button
              onclick="cloud.resetMatch()"
              style="background-color: #e74c3c; color: white"
            >
              Zerar Tudo
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL DAS EQUIPAS -->
    <div id="team-modal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <h2 id="modal-title">Escolher Seleção</h2>
          <button class="close-btn" onclick="ui.closeModal()">X</button>
        </div>
        <div id="modal-grid" class="modal-grid"></div>
      </div>
    </div>

    <script>
      const selecoes = [
        { name: "África do Sul", code: "AFR", flag: "za", color: "#007749" },
        { name: "Marrocos", code: "MAR", flag: "ma", color: "#c1272d" },

        { name: "Tunísia", code: "TUN", flag: "tn", color: "#e70013" },
        { name: "Egito", code: "EGI", flag: "eg", color: "#ce1126" },
        { name: "Cabo Verde", code: "CPV", flag: "cv", color: "#003893" },
        { name: "Senegal", code: "SEN", flag: "sn", color: "#00853f" },
        { name: "Argélia", code: "ARG", flag: "dz", color: "#006233" }, // Nota: ARG costuma ser Argentina, em chaves vira ALG para Argélia, mas no padrão puro PT costuma-se usar ALG para evitar conflito. Ajustado para ALG abaixo por segurança.
        { name: "RD Congo", code: "RDC", flag: "cd", color: "#007fff" },

        { name: "Curaçau", code: "CUR", flag: "cw", color: "#002b7f" },
        { name: "Estados Unidos", code: "EUA", flag: "us", color: "#3c3b6e" },
        { name: "Panamá", code: "PAN", flag: "pa", color: "#da291c" },
        { name: "Brasil", code: "BRA", flag: "br", color: "#009c3b" },
        { name: "Paraguai", code: "PAR", flag: "py", color: "#d52b1e" },
        { name: "Equador", code: "EQU", flag: "ec", color: "#ffdd00" },
        { name: "Uruguai", code: "URU", flag: "uy", color: "#0038a8" },
        { name: "Argentina", code: "ARG", flag: "ar", color: "#74acdf" },
        { name: "Colômbia", code: "COL", flag: "co", color: "#fcd116" },
        { name: "Coreia do Sul", code: "COR", flag: "kr", color: "#c60c30" },
        { name: "Catar", code: "CAT", flag: "qa", color: "#8a1538" },
        { name: "Japão", code: "JAP", flag: "jp", color: "#000555" },
        { name: "Irã", code: "IRA", flag: "ir", color: "#239f40" },
        { name: "Arábia Saudita", code: "ARA", flag: "sa", color: "#006c35" },
        { name: "Iraque", code: "IRQ", flag: "iq", color: "#007a3d" },
        { name: "Jordânia", code: "JOR", flag: "jo", color: "#ce1126" },
        { name: "Uzbequistão", code: "UZB", flag: "uz", color: "#0099b5" },
        { name: "Rep. Tcheca", code: "TCH", flag: "cz", color: "#11457e" },
        { name: "Bósnia", code: "BOS", flag: "ba", color: "#002395" },
        { name: "Suíça", code: "SUI", flag: "ch", color: "#ff0000" },
        { name: "Escócia", code: "ESC", flag: "gb-sct", color: "#005eb8" },
        { name: "Turquia", code: "TUR", flag: "tr", color: "#e30a17" },
        { name: "Alemanha", code: "ALE", flag: "de", color: "#000000" },
        { name: "Holanda", code: "HOL", flag: "nl", color: "#f36c21" },
        { name: "Suécia", code: "SUE", flag: "se", color: "#006aa7" },
        { name: "Bélgica", code: "BEL", flag: "be", color: "#c7a8ff" },
        { name: "Espanha", code: "ESP", flag: "es", color: "#aa151b" },
        { name: "França", code: "FRA", flag: "fr", color: "#002395" },
        { name: "Noruega", code: "NOR", flag: "no", color: "#ba0c2f" },
        { name: "Áustria", code: "AUT", flag: "at", color: "#ed2939" },
        { name: "Portugal", code: "POR", flag: "pt", color: "#ff9a96" },
        { name: "Inglaterra", code: "ING", flag: "gb-eng", color: "#cf142b" },
        { name: "Croácia", code: "CRO", flag: "hr", color: "#ff0000" },
        { name: "Austrália", code: "AUS", flag: "au", color: "#008751" },
        { name: "Nova Zelândia", code: "NZL", flag: "nz", color: "#000000" },
      ];

      let localState = null;
      let renderTimerInterval = null;

      window.getInitialState = () => ({
        t1: {
          score: 0,
          red: 0,
          pen: 0,
          code: "MEX",
          flag: "mx",
          color: "#006847",
        },
        t2: {
          score: 0,
          red: 0,
          pen: 0,
          code: "AFS",
          flag: "za",
          color: "#fcd116",
        },
        match: {
          phase: "1T",
          isPlaying: false,
          baseSeconds: 0,
          stoppageBaseSeconds: 0,
          isStoppageActive: false,
          lastStartTime: 0,
          stopMinutes: 0,
        },
      });

      function setRole(role) {
        document.getElementById("role-selector").style.display = "none";

        applyRole(role);
      }

      function applyRole(role) {
        if (role === "obs") document.body.className = "hidden-admin";
        else if (role === "admin") document.body.className = "hidden-obs";
      }

      window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const view = urlParams.get("view");
        if (view === "obs" || view === "admin") {
          document.getElementById("role-selector").style.display = "none";
          applyRole(view);
        }
        ui.initPickers();
        ui.buildModal();
      };

      function getTimes() {
        if (!localState) return { reg: 0, stop: 0 };
        const match = localState.match;
        let reg = match.baseSeconds || 0;
        let stop = match.stoppageBaseSeconds || 0;

        if (match.isPlaying && match.lastStartTime > 0) {
          const diff = Math.floor((Date.now() - match.lastStartTime) / 1000);
          if (match.isStoppageActive) {
            stop += diff;
          } else {
            reg += diff;
          }
        }
        return { reg, stop };
      }

      function renderTime() {
        if (!localState) return;
        const times = getTimes();

        const m = Math.floor(times.reg / 60)
          .toString()
          .padStart(2, "0");
        const s = (times.reg % 60).toString().padStart(2, "0");

        document.getElementById("timer-display").innerText = `${m}:${s}`;

        const match = localState.match;
        if (match.isStoppageActive || match.stopMinutes > 0) {
          document.getElementById("stoppage-box").style.display = "flex";
          document.getElementById("stoppage-min").innerText = match.stopMinutes;

          const sm = Math.floor(times.stop / 60)
            .toString()
            .padStart(2, "0");
          const ss = (times.stop % 60).toString().padStart(2, "0");
          document.getElementById("stoppage-timer").innerText = `${sm}:${ss}`;
        } else {
          document.getElementById("stoppage-box").style.display = "none";
        }
      }

      window.syncToUI = (data) => {
        localState = data;

        document.getElementById("score-t1-display").innerText = data.t1.score;
        document.getElementById("name-t1").innerText = data.t1.code;
        document.getElementById("flag-t1").src =
          `https://flagcdn.com/w40/${data.t1.flag}.png`;
        document.getElementById("ctrl-name-1").innerText =
          `Equipa Esquerda (${data.t1.code})`;
        document.documentElement.style.setProperty(
          `--dot-color-1`,
          data.t1.color,
        );
        ui.renderReds(1, data.t1.red);
        document.getElementById("pen-t1").innerText = data.t1.pen;

        // Atualiza UI Equipa 2
        document.getElementById("score-t2-display").innerText = data.t2.score;
        document.getElementById("name-t2").innerText = data.t2.code;
        document.getElementById("flag-t2").src =
          `https://flagcdn.com/w40/${data.t2.flag}.png`;
        document.getElementById("ctrl-name-2").innerText =
          `Equipa Direita (${data.t2.code})`;
        document.documentElement.style.setProperty(
          `--dot-color-2`,
          data.t2.color,
        );
        ui.renderReds(2, data.t2.red);
        document.getElementById("pen-t2").innerText = data.t2.pen;

        // Fase do Jogo
        const phase = data.match.phase;
        document.getElementById("match-phase").innerText = phase;
        document.getElementById("match-phase").style.display =
          phase === "1T" || phase === "2T" ? "none" : "inline-block";
        document.getElementById("penalty-display").style.display =
          phase === "PEN" ? "block" : "none";

        // Botões Admin
        const btnPlay = document.getElementById("btn-play-pause");
        btnPlay.innerText = data.match.isPlaying
          ? "⏸ Tempo Correndo..."
          : "▶ Iniciar / ⏸ Pausar";

        // Inicia o loop visual do tempo
        if (!renderTimerInterval)
          renderTimerInterval = setInterval(renderTime, 1000);
        renderTime(); // Renderiza logo ao chegar o dado
      };

      window.cloud = {
        changeScore: (team, amount) => {
          if (!localState) return;
          const novoV = Math.max(0, localState[`t${team}`].score + amount);
          window.dbControls.updateState({
            [`t${team}`]: { ...localState[`t${team}`], score: novoV },
          });
        },
        changeRed: (team, amount) => {
          if (!localState) return;
          let novoV = Math.max(0, localState[`t${team}`].red + amount);
          novoV = Math.min(5, novoV);
          window.dbControls.updateState({
            [`t${team}`]: { ...localState[`t${team}`], red: novoV },
          });
        },
        changePen: (team, amount) => {
          if (!localState) return;
          const novoV = Math.max(0, localState[`t${team}`].pen + amount);
          window.dbControls.updateState({
            [`t${team}`]: { ...localState[`t${team}`], pen: novoV },
          });
        },
        setPhase: (fase) =>
          window.dbControls.updateState({
            match: { ...localState.match, phase: fase },
          }),

        toggleTimer: () => {
          if (!localState) return;
          const match = localState.match;
          if (match.isPlaying) {
            const times = getTimes();
            window.dbControls.updateState({
              match: {
                ...match,
                isPlaying: false,
                baseSeconds: times.reg,
                stoppageBaseSeconds: times.stop,
                lastStartTime: 0,
              },
            });
          } else {
            window.dbControls.updateState({
              match: { ...match, isPlaying: true, lastStartTime: Date.now() },
            });
          }
        },
        setTimer: () => {
          if (!localState) return;
          const m = parseInt(document.getElementById("set-minutes").value) || 0;
          const s = parseInt(document.getElementById("set-seconds").value) || 0;

          window.dbControls.updateState({
            match: {
              ...localState.match,
              isPlaying: false,
              baseSeconds: m * 60 + s,
              lastStartTime: 0,
            },
          });
        },
        setStoppage: () => {
          if (!localState) return;
          const min =
            parseInt(document.getElementById("stoppage-time").value) || 0;
          const isStoppageActive = min > 0;
          const times = getTimes();

          window.dbControls.updateState({
            match: {
              ...localState.match,
              stopMinutes: min,
              isStoppageActive: isStoppageActive,
              baseSeconds: times.reg,
              stoppageBaseSeconds: isStoppageActive ? times.stop : 0,
              isPlaying: isStoppageActive ? true : localState.match.isPlaying,
              lastStartTime:
                isStoppageActive || localState.match.isPlaying ? Date.now() : 0,
            },
          });
        },
        resetMatch: () => {
          window.dbControls.updateState(window.getInitialState());
        },
      };

      let targetingTeam = 1;
      window.ui = {
        renderReds: (team, amount) => {
          const container = document.getElementById(`red-cards-${team}`);
          container.innerHTML = "";
          for (let i = 0; i < amount; i++) {
            const card = document.createElement("div");
            card.className = "red-card";
            container.appendChild(card);
          }
        },
        openModal: (team) => {
          targetingTeam = team;
          document.getElementById("modal-title").innerText =
            team === 1 ? "Equipa Esquerda" : "Equipa Direita";
          document.getElementById("team-modal").style.display = "flex";
        },
        closeModal: () => {
          document.getElementById("team-modal").style.display = "none";
        },
        buildModal: () => {
          const grid = document.getElementById("modal-grid");
          selecoes.forEach((team) => {
            const card = document.createElement("div");
            card.className = "team-card";
            card.innerHTML = `<img src="https://flagcdn.com/w40/${team.flag}.png" alt="flag"><span>${team.code}</span>`;
            card.onclick = () => {
              window.dbControls.updateState({
                [`t${targetingTeam}`]: {
                  ...localState[`t${targetingTeam}`],
                  code: team.code,
                  flag: team.flag,
                  color: team.color,
                },
              });
              ui.closeModal();
            };
            grid.appendChild(card);
          });
        },
        initPickers: () => {
          [1, 2].forEach((team) => {
            const btn = document.getElementById(`picker-btn-${team}`);
            new Picker({
              parent: btn,
              popup: "bottom",
              alpha: false,
              onChange: (color) => {
                btn.style.backgroundColor = color.hex;
                if (localState) {
                  window.dbControls.updateState({
                    [`t${team}`]: {
                      ...localState[`t${team}`],
                      color: color.hex,
                    },
                  });
                }
              },
            });
          });
        },
      };
    </script>
  </body>
</html>
